<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apostles Spotlights</title>
    <style>
        /* Insert styles here */
        body {
            background-color: #e8eced;
            font-family: "arial";
        }
        #box {
            background: url(images/christus.webp);
            background-position: -206px 0px;
            background-size: cover;
            border: solid black; 
            border-radius: 40px; 
            height: 700px; 
            width: 800px;
            
        }

        .spotlight{ 
            border: 10px solid white; 
            width: 80px;
            height: 80px;
            border-radius: 50%;
           overflow: hidden;
     
        
        }

        .spotlight img {
            width: 80px;
            
        }
        .firstprez {
            position: relative;
            left: 200px;
            
            width: 100px;
            height: 100px;

        }
        .firstprez img {
            width: 100px;
        }
        .firstpreztwo {
            position: relative; 
            left: 500px; 
          
            width: 100px;
            height: 100px;


        }
        .firstpreztwo img {
            width: 100px;
        }
    
    </style>

</head>
<body>
    <!-- Insert HTML elements here -->
<div id="box">
    <div class="spotlight"> 
        <img src="images/gong.webp" alt="gong"> 
    </div>
    <div class="spotlight firstprez"> 
        <img src="images/eyring.webp" alt="eyring"> 
    </div>

        <div class="spotlight firstpreztwo"> 
        <img src="images/christofferson.webp" alt="christoffersonn"> 
    </div>
</div>
</body>
</html>
